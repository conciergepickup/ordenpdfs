<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orden de Servicio - PickupPlus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        /* Estilos generales de impresión */
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background-color: white; padding: 0; margin: 0; }
            .container-main { box-shadow: none; border: none; max-width: 100% !important; width: 100% !important; }
            
            /* Ajuste de Logo en Formato Carta (GRANDE) */
            #logo-preview-print {
                max-height: 3.5cm !important;
                width: auto !important;
                display: block !important;
                margin: 0 auto 15px auto;
            }
        }

        /* Optimización específica para Impresora Térmica */
        @media print {
            .thermal-ticket {
                width: 80mm !important;
                padding: 3mm !important;
                margin: 0 auto;
            }
            .thermal-ticket * {
                font-size: 9pt !important;
                color: black !important;
            }
            .thermal-ticket #logo-preview-print {
                max-height: 1.5cm !important;
            }
            .thermal-ticket h1, .thermal-ticket h2 { font-size: 12pt !important; }
            .thermal-ticket .bg-[#009ee3] { background-color: transparent !important; color: black !important; border-bottom: 2px solid black; }
            .thermal-ticket .bg-slate-900, .thermal-ticket .bg-slate-50, .thermal-ticket .bg-amber-50 { 
                background-color: transparent !important; 
                border: 1px solid black !important; 
            }
            .thermal-ticket .rounded-3xl, .thermal-ticket .rounded-2xl, .thermal-ticket .rounded-xl {
                border-radius: 0 !important;
            }
            .thermal-ticket .details-grid {
                display: block !important;
            }
            .thermal-ticket .details-grid > div {
                margin-bottom: 10px;
            }
        }

        .vehicle-option input:checked + div {
            border-color: #009ee3;
            background-color: #f0f9ff;
            box-shadow: 0 0 0 2px #009ee3;
        }
        #qrcode img { margin: 0 auto; }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #009ee3;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div id="main-card" class="max-w-3xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-200 container-main">
        
        <div class="bg-[#009ee3] p-8 text-white relative header-section no-print">
            <div class="flex justify-between items-start relative z-10">
                <div>
                    <h1 class="text-2xl font-black uppercase tracking-tighter">Orden de Servicio</h1>
                    <p class="text-sky-100 text-xs font-bold uppercase tracking-widest mt-1">Transporte Turístico Especializado</p>
                </div>
                <div>
                    <input type="file" id="logo-input" accept="image/*" class="hidden">
                    <button onclick="document.getElementById('logo-input').click()" class="bg-white/20 hover:bg-white/30 backdrop-blur-md text-white text-[10px] uppercase font-bold py-2 px-4 rounded-full border border-white/30 transition-all">
                        Subir Logo
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-slate-900 px-8 py-3 no-print flex justify-between items-center">
            <span class="text-slate-400 text-[10px] font-bold tracking-wider uppercase">Procesado por Mercado Pago</span>
            <span class="text-sky-400 font-bold text-sm">$20.00 MXN</span>
        </div>

        <div id="logo-preview-container" class="px-8 pt-6 hidden flex items-center justify-center border-b border-dashed border-slate-200 pb-4 no-print">
            <div class="relative group">
                <img id="logo-preview" src="" alt="Logo" class="max-h-24">
                <button onclick="removeLogo()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 shadow-lg">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
        </div>

        <form id="transportForm" class="p-8 space-y-6 no-print">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-4">
                    <label class="block text-[10px] font-bold text-sky-600 uppercase ml-1 tracking-wider">Información del Cliente</label>
                    <input type="text" name="empresa" placeholder="Nombre de la Empresa" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-sky-500 transition-all">
                    <input type="text" name="nombre" placeholder="Nombre del Pasajero" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-sky-500 transition-all">
                    <input type="text" name="vuelo" placeholder="Número de Vuelo" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-sky-500 transition-all">
                </div>

                <div class="space-y-4">
                    <label class="block text-[10px] font-bold text-sky-600 uppercase ml-1 tracking-wider">Logística de Viaje</label>
                    <input type="datetime-local" name="fecha" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-sky-500 transition-all">
                    <input type="text" name="origen" placeholder="Punto de Origen" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-sky-500 transition-all">
                    <input type="text" name="destino" placeholder="Destino Final" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-sky-500 transition-all">
                </div>

                <div class="space-y-4">
                    <label class="block text-[10px] font-bold text-sky-600 uppercase ml-1 tracking-wider">Unidad Asignada</label>
                    <input type="text" name="conductor" placeholder="Nombre del Conductor" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-sky-500 transition-all">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" name="placas" placeholder="Placas" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-sky-500 transition-all">
                        <input type="text" name="color" placeholder="Color" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-sky-500 transition-all">
                    </div>
                </div>

                <div class="space-y-4">
                    <label class="block text-[10px] font-bold text-sky-600 uppercase ml-1 tracking-wider">Finanzas</label>
                    <div class="relative">
                        <span class="absolute left-4 top-3.5 text-slate-400 font-bold">$</span>
                        <input type="number" step="0.01" name="balance" placeholder="Balance por Cobrar" required class="w-full pl-8 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-sky-500 transition-all">
                    </div>
                </div>
            </div>

            <div class="pt-4 border-t border-slate-100">
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-3 ml-1">Tipo de Vehículo</label>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                    <label class="vehicle-option cursor-pointer">
                        <input type="radio" name="vehiculo" value="Sedán" class="hidden" checked>
                        <div class="border border-slate-200 p-3 rounded-xl text-center transition-all">
                            <span class="text-[10px] font-bold uppercase block">Sedán</span>
                        </div>
                    </label>
                    <label class="vehicle-option cursor-pointer">
                        <input type="radio" name="vehiculo" value="Van" class="hidden">
                        <div class="border border-slate-200 p-3 rounded-xl text-center transition-all">
                            <span class="text-[10px] font-bold uppercase block">Van</span>
                        </div>
                    </label>
                    <label class="vehicle-option cursor-pointer">
                        <input type="radio" name="vehiculo" value="SUV" class="hidden">
                        <div class="border border-slate-200 p-3 rounded-xl text-center transition-all">
                            <span class="text-[10px] font-bold uppercase block">SUV</span>
                        </div>
                    </label>
                    <label class="vehicle-option cursor-pointer">
                        <input type="radio" name="vehiculo" value="VIP" class="hidden">
                        <div class="border border-slate-200 p-3 rounded-xl text-center transition-all">
                            <span class="text-[10px] font-bold uppercase block">VIP</span>
                        </div>
                    </label>
                </div>
            </div>

            <button type="submit" id="submit-button" class="w-full bg-[#009ee3] hover:bg-[#0086c3] text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-sky-200">
                Pagar $20.00 MXN con Mercado Pago
            </button>
        </form>

        <div id="print-area" class="hidden p-8 space-y-6 bg-white print-only">
            
            <div id="logo-print-container" class="flex justify-center mb-6 hidden">
                <img id="logo-preview-print" src="" alt="Logo Empresa">
            </div>

            <div class="flex justify-between items-start border-b-2 border-slate-100 pb-6 print-header">
                <div class="flex items-center gap-4">
                    <div id="pp-icon-print" class="bg-[#009ee3] p-3 rounded-xl text-white font-black text-lg">PP</div>
                    <div>
                        <p class="text-[11px] font-bold text-slate-400 uppercase mb-1" id="print-empresa-header">Empresa</p>
                        <h2 class="text-lg font-black text-slate-900 uppercase">Orden de Transporte</h2>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-slate-500 text-[11px] font-bold uppercase" id="display-id">ID: #---</p>
                    <p class="text-[10px] text-slate-400" id="print-current-date"></p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-x-12 gap-y-8 text-[12px] details-grid py-4">
                <div class="space-y-5">
                    <div>
                        <p class="text-[10px] font-bold text-sky-500 uppercase">Pasajero</p>
                        <p class="font-bold text-slate-800 text-base" id="display-nombre">-</p>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-sky-500 uppercase">Ruta</p>
                        <p class="text-slate-800"><span class="font-bold text-slate-400 uppercase text-[9px]">Origen:</span> <span id="display-origen"></span></p>
                        <p class="text-slate-800"><span class="font-bold text-slate-400 uppercase text-[9px]">Destino:</span> <span id="display-destino"></span></p>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-sky-500 uppercase">Unidad</p>
                        <p class="text-slate-800 font-bold" id="display-vehiculo-desc">-</p>
                        <p class="text-slate-500">Placas: <span id="display-placas" class="text-slate-800 font-bold"></span> | Color: <span id="display-color"></span></p>
                    </div>
                </div>
                <div class="space-y-5">
                    <div>
                        <p class="text-[10px] font-bold text-sky-500 uppercase">Fecha y Hora</p>
                        <p class="font-bold text-slate-800 text-base" id="display-fecha">-</p>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-sky-500 uppercase">Conductor</p>
                        <p class="font-bold text-slate-800 text-base" id="display-conductor">-</p>
                    </div>
                    <div class="bg-amber-50 p-4 rounded-2xl border border-amber-100 balance-box">
                        <p class="text-[10px] font-bold text-amber-600 uppercase">Balance por Cobrar</p>
                        <p class="text-2xl font-black text-amber-700" id="display-balance">$0.00</p>
                    </div>
                </div>
            </div>

            <div class="bg-slate-50 p-8 rounded-3xl flex flex-col items-center justify-center space-y-4 border border-slate-100 qrcode-section">
                <div id="qrcode"></div>
                <p class="text-[11px] font-bold text-slate-600 uppercase">Pago Confirmado vía Mercado Pago</p>
            </div>
            
            <div class="flex flex-col gap-3 no-print mt-8">
                <button onclick="window.print()" class="w-full bg-sky-600 text-white py-4 rounded-xl font-bold shadow-lg flex items-center justify-center gap-2 hover:bg-sky-700 transition-all">
                    Imprimir Formato Carta (Logo Grande)
                </button>
                <button onclick="printTicket()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold shadow-lg flex items-center justify-center gap-2 hover:bg-slate-900 transition-all">
                    Imprimir Ticket Térmico
                </button>
                <button onclick="location.reload()" class="w-full bg-slate-100 text-slate-600 py-3 rounded-xl font-bold mt-2 hover:bg-slate-200 transition-all">
                    Nueva Orden
                </button>
            </div>
        </div>
    </div>

    <script>
        const MERCADO_PAGO_LINK = "https://mpago.la/2WY5xxn";

        const logoInput = document.getElementById('logo-input');
        const logoPreview = document.getElementById('logo-preview');
        const logoPreviewPrint = document.getElementById('logo-preview-print');
        const logoContainer = document.getElementById('logo-preview-container');
        const logoPrintContainer = document.getElementById('logo-print-container');
        const ppIconPrint = document.getElementById('pp-icon-print');

        logoInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const dataUrl = event.target.result;
                    logoPreview.src = dataUrl;
                    logoPreviewPrint.src = dataUrl;
                    logoContainer.classList.remove('hidden');
                    logoPrintContainer.classList.remove('hidden');
                    ppIconPrint.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        function removeLogo() {
            logoPreview.src = ""; logoPreviewPrint.src = "";
            logoContainer.classList.add('hidden');
            logoPrintContainer.classList.add('hidden');
            ppIconPrint.classList.remove('hidden');
            logoInput.value = "";
        }

        const form = document.getElementById('transportForm');
        
        function generateTicket() {
            const formData = new FormData(form);
            document.getElementById('display-nombre').innerText = formData.get('nombre');
            document.getElementById('display-origen').innerText = formData.get('origen');
            document.getElementById('display-destino').innerText = formData.get('destino');
            document.getElementById('display-fecha').innerText = formData.get('fecha').replace('T', ' ');
            document.getElementById('display-conductor').innerText = formData.get('conductor');
            document.getElementById('display-vehiculo-desc').innerText = formData.get('vehiculo');
            document.getElementById('display-placas').innerText = formData.get('placas');
            document.getElementById('display-color').innerText = formData.get('color');
            document.getElementById('display-balance').innerText = `$${parseFloat(formData.get('balance')).toFixed(2)} MXN`;
            document.getElementById('print-empresa-header').innerText = formData.get('empresa');
            
            const orderId = Math.random().toString(36).substr(2, 9).toUpperCase();
            document.getElementById('display-id').innerText = "ID: #" + orderId;
            document.getElementById('print-current-date').innerText = new Date().toLocaleDateString();

            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), {
                text: `ID:${orderId}|PASAJERO:${formData.get('nombre')}|PAGO:CONFIRMADO_MP`,
                width: 140, height: 140, colorDark : "#000000", colorLight : "#ffffff"
            });

            form.classList.add('hidden');
            document.getElementById('print-area').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function printTicket() {
            const container = document.getElementById('main-card');
            container.classList.add('thermal-ticket');
            setTimeout(() => {
                window.print();
                container.classList.remove('thermal-ticket');
            }, 100);
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-button');
            btn.innerHTML = `<span class="loader"></span> Procesando Pago...`;
            btn.disabled = true;
            window.open(MERCADO_PAGO_LINK, '_blank');
            setTimeout(() => { generateTicket(); }, 3000);
        });
    </script>
</body>
</html>
